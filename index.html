<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ritu ❤️</title>
<style>
  body {
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
  }

  .box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    width: 340px;
    z-index: 2;
  }

  h1 { color: #ff4d6d; }

  .buttons {
    margin-top: 20px;
    position: relative;
    height: 60px;
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    position: absolute;
  }

  #yes {
    background: #ff4d6d;
    color: white;
    left: 20px;
  }

  #no {
    background: #ddd;
    right: 20px;
    animation: shake 0.3s infinite;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(2px,-2px); }
    50% { transform: translate(-2px,2px); }
    75% { transform: translate(2px,2px); }
    100% { transform: translate(0,0); }
  }

  img {
    width: 220px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="box" id="card">
  <h1>Ritu, will you be my Valentine? 💘</h1>

  <div class="buttons">
    <button id="yes" onclick="yesClick()">Yes 💖</button>
    <button id="no">No 😜</button>
  </div>
</div>

<script>
  const noBtn = document.getElementById("no");
  let speed = 400;

  function moveButton() {
    speed -= 40;
    if (speed < 80) speed = 80;

    const box = document.querySelector(".box");
    const rect = box.getBoundingClientRect();

    const x = Math.random() * (rect.width - 80);
    const y = Math.random() * (rect.height - 40);

    noBtn.style.transition = speed + "ms";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  noBtn.addEventListener("mouseover", moveButton);
  noBtn.addEventListener("touchstart", moveButton);

  function yesClick() {
    document.getElementById("card").innerHTML = `
      <h1>Yayyy Ritu! 💕</h1>
      <p>You just made my day 😍</p>
      <img src="https://github.com/amuu10/valentine/blob/main/Ritu.jpg">
    `;

    setTimeout(() => {
      const text = encodeURIComponent(
        "Ritu just said YES 💕😍\nBest Valentine moment ever!"
      );
      window.open("https://wa.me/?text=" + text, "_blank");
    }, 2000);
  }
</script>

</body>
</html>
